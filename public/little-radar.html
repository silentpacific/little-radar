<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Little Radar</title>

<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  background:#031009;
  color:#D7FFE9;
  font-family:Arial;
}

.app{
  display:grid;
  grid-template-columns:1fr 340px;
  height:100vh;
}

.left{
  padding:20px;
}

.controls{
  display:flex;
  gap:12px;
  margin:20px 0;
}

button,input{
  padding:12px;
  border:none;
  border-radius:12px;
}

button{
  background:#58FFAF;
  cursor:pointer;
}

input{
  background:#11231B;
  color:white;
  width:90px;
}

.radar{
  width:min(900px,90vw);
  aspect-ratio:1;
  position:relative;
  border-radius:50%;
  overflow:hidden;
  background:
    radial-gradient(circle,rgba(0,255,140,.03),rgba(0,0,0,0)),
    #04120A;
}

.cross{
  position:absolute;
  left:50%;
  top:0;
  width:1px;
  height:100%;
  background:rgba(100,255,180,.25);
}

.cross2{
  position:absolute;
  top:50%;
  left:0;
  width:100%;
  height:1px;
  background:rgba(100,255,180,.25);
}

.ring{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  border:1px solid rgba(100,255,180,.25);
  border-radius:50%;
  pointer-events:none;
}

.ringLabel{
  position:absolute;
  top:-22px;
  left:50%;
  transform:translateX(-50%);
  font-size:12px;
  color:#8FFFBD;
  padding:2px 8px;
  background:rgba(0,0,0,.45);
  border-radius:10px;
  white-space:nowrap;
}

.sweep{
  position:absolute;
  inset:0;
  background:conic-gradient(rgba(88,255,175,.22),transparent 55deg);
  animation:spin 4s linear infinite;
}

@keyframes spin{
  to{ transform:rotate(360deg); }
}

.center{
  position:absolute;
  left:50%;
  top:50%;
  width:14px;
  height:14px;
  background:#58FFAF;
  border-radius:50%;
  transform:translate(-50%,-50%);
}

.dot{
  position:absolute;
  width:12px;
  height:12px;
  background:#58FFAF;
  border-radius:50%;
  transform:translate(-50%,-50%);
  box-shadow:0 0 18px #58FFAF;
}

.label{
  position:absolute;
  left:16px;
  top:-8px;
  font-size:12px;
  white-space:nowrap;
}

.dir{
  position:absolute;
  font-size:20px;
  font-weight:700;
  color:#7FFFBE;
}

.panel{
  padding:20px;
  background:#091711;
  overflow:auto;
}

.card{
  background:#10221A;
  padding:12px;
  margin-bottom:12px;
  border-radius:10px;
}

.small{
  color:#8DB39C;
  font-size:13px;
}
</style>
</head>

<body>

<div class="app">

  <div class="left">
    <h1>LITTLE RADAR</h1>

    <div class="controls">
      <button onclick="locate()">Use my location</button>
      <input id="radius" value="25">
      <button onclick="scan()">Refresh</button>
    </div>

    <div class="radar" id="radar">

      <div class="sweep"></div>
      <div class="cross"></div>
      <div class="cross2"></div>

      <div class="ring" style="width:30%;height:30%;">
        <div class="ringLabel" id="ring1">—</div>
      </div>

      <div class="ring" style="width:60%;height:60%;">
        <div class="ringLabel" id="ring2">—</div>
      </div>

      <div class="ring" style="width:90%;height:90%;">
        <div class="ringLabel" id="ring3">—</div>
      </div>

      <div class="dir" style="left:50%;top:6px;transform:translateX(-50%);">N</div>
      <div class="dir" style="right:6px;top:50%;">E</div>
      <div class="dir" style="left:50%;bottom:6px;transform:translateX(-50%);">S</div>
      <div class="dir" style="left:6px;top:50%;">W</div>

      <div class="center"></div>

    </div>
  </div>

  <div class="panel">

    <div class="card">
      Aircraft: <span id="count">0</span>
    </div>

    <div class="card" id="location">
      Waiting…
    </div>

    <div class="card" id="aircraftList">
      No aircraft
    </div>

    <div class="card" id="logs">
      Logs
    </div>

  </div>

</div>

<script>
let userLat=-34.92;
let userLon=138.60;

const radarEl=document.getElementById("radar");
const radiusInput=document.getElementById("radius");
const countEl=document.getElementById("count");
const logsEl=document.getElementById("logs");
const aircraftListEl=document.getElementById("aircraftList");
const locationEl=document.getElementById("location");

const planeMap=new Map();

function log(msg){
  logsEl.insertAdjacentHTML(
    "afterbegin",
    `<div class="small">${new Date().toLocaleTimeString()} · ${msg}</div>`
  );
}

function getKey(p){
  return (p.flight || "unknown").trim();
}

function createPlane(key){
  const d=document.createElement("div");
  d.className="dot";
  d.style.transition="left 2s linear, top 2s linear, opacity 1s";
  d.style.opacity="0";
  d.innerHTML=`<div class="label"></div>`;
  radarEl.appendChild(d);

  planeMap.set(key,{
    el:d,
    lastSeen:Date.now()
  });

  return d;
}

function updatePlane(plane,radius){
  const key=getKey(plane);

  let obj=planeMap.get(key);

  if(!obj){
    obj={
      el:createPlane(key),
      lastSeen:Date.now()
    };
  }

  const angle=(plane.heading || 0) * Math.PI / 180;

  const r=Math.min(plane.distance / radius,1) * 45;

  const x=50 + Math.cos(angle) * r;
  const y=50 + Math.sin(angle) * r;

  obj.el.style.left=x+"%";
  obj.el.style.top=y+"%";
  obj.el.style.opacity="1";

  obj.el.querySelector(".label").innerHTML=
    `${key}<br>${Math.round(plane.distance)} km`;

  obj.lastSeen=Date.now();
  planeMap.set(key,obj);
}

function cleanup(){
  const now=Date.now();

  planeMap.forEach((plane,key)=>{
    if(now - plane.lastSeen > 30000){
      plane.el.style.opacity=0;

      setTimeout(()=>{
        plane.el.remove();
      },1000);

      planeMap.delete(key);
    }
  });
}

function updateScale(){
  const radius=Number(radiusInput.value || 25);

  document.getElementById("ring1").innerHTML=
    `${Math.round(radius*.33)} km`;

  document.getElementById("ring2").innerHTML=
    `${Math.round(radius*.66)} km`;

  document.getElementById("ring3").innerHTML=
    `${radius} km`;
}

async function scan(){
  const radius=Number(radiusInput.value || 25);

  updateScale();

  log(`Scanning ${radius} km`);

  const planes=await fetch(
    `/planes?lat=${userLat}&lon=${userLon}&radius=${radius}`
  ).then(r=>r.json());

  countEl.innerHTML=planes.length;
  aircraftListEl.innerHTML="";

  planes.forEach(p=>{
    updatePlane(p,radius);

    aircraftListEl.insertAdjacentHTML(
      "beforeend",
      `<div class="small">${p.flight || "Flight"} · ${Math.round(p.distance)} km</div>`
    );
  });

  cleanup();

  locationEl.innerHTML=
    `${userLat.toFixed(4)}<br>${userLon.toFixed(4)}<br>Radius: ${radius} km`;
}

function locate(){
  navigator.geolocation.getCurrentPosition(
    p=>{
      userLat=p.coords.latitude;
      userLon=p.coords.longitude;
      log("Location ready");
      scan();
    },
    err=>{
      log("Location error: " + err.message);
      scan();
    }
  );
}

locate();

setInterval(scan,15000);
</script>

</body>
</html>
