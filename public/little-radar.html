<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Little Radar</title>
<style>

/* ── RESET ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #031009;
  color: #D7FFE9;
  font-family: Arial, sans-serif;
}

/* ── ROOT LAYOUT ──
   Portrait/desktop default: radar area left, info panel right (260px).
   Landscape and tiny overrides below. */
.app {
  width: 100vw;
  height: 100vh;
  display: grid;
  grid-template-columns: minmax(0, 1fr) 260px;
  overflow: hidden;
}

/* ── LEFT COLUMN ──
   Uses a grid so title/controls each take exactly their natural height
   and the radar row gets whatever remains — preventing the disc from
   ever squashing the controls bar above it. */
.left {
  display: grid;
  grid-template-rows: auto auto minmax(0, 1fr);
  padding: 12px;
  gap: 10px;
  min-width: 0;
  min-height: 0;
}

h1 { font-size: 42px; }

/* ── CONTROLS ── */
.controls {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
}

button, input {
  padding: 8px 14px;
  border-radius: 12px;
  font-size: 14px;
  cursor: pointer;
  white-space: nowrap;
  border: 1px solid #58FFAF;
}

button              { background: #11231B; color: #58FFAF; }
button:hover        { background: #1a3328; }
button.active       { background: #58FFAF; color: #031009; }
button.action       { background: #58FFAF; color: #031009; }
button.action:hover { background: #3ddda0; }
input { width: 74px; background: #11231B; color: white; border-color: #1e3d2e; }

/* ── RADAR DISC ──
   aspect-ratio:1 keeps it square.
   max-height:100% + align/justify-self:center means it fills the grid
   cell but never overflows it — curing the "bottom half cut off" bug.
   overflow:hidden clips the canvas/sweep to the circle. */
.radar {
  width: 100%;
  height: 100%;
  max-width: 100%;
  max-height: 100%;
  aspect-ratio: 1 / 1;
  align-self: center;
  justify-self: center;
  position: relative;
  border-radius: 50%;
  overflow: hidden;
  background: radial-gradient(circle, rgba(0,255,140,.03), transparent), #04120A;
}

/* Map canvas — lowest layer inside the disc */
#mapCanvas {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 1;
  opacity: 0;
  transition: opacity 1s ease;
}

/* Crosshairs */
.cross  { position: absolute; left: 50%; top: 0;   width: 1px;  height: 100%; background: rgba(100,255,180,.25); z-index: 2; }
.cross2 { position: absolute; left: 0;   top: 50%; width: 100%; height: 1px;  background: rgba(100,255,180,.25); z-index: 2; }

/* Range rings */
.ring {
  position: absolute;
  left: 50%; top: 50%;
  transform: translate(-50%, -50%);
  border: 1px solid rgba(100,255,180,.25);
  border-radius: 50%;
  z-index: 2;
}

.ringLabel {
  position: absolute;
  bottom: 14%; right: 6%;
  font-size: 12px;
  color: #8FFFBD;
  padding: 2px 8px;
  background: rgba(0,0,0,.6);
  border-radius: 10px;
  white-space: nowrap;
  pointer-events: none;
}

/* Rotating sweep */
.sweep {
  position: absolute; inset: 0;
  background: conic-gradient(rgba(88,255,175,.22), transparent 55deg);
  animation: spin 4s linear infinite;
  z-index: 3;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Centre dot */
.center {
  position: absolute;
  left: 50%; top: 50%;
  width: 14px; height: 14px;
  background: #58FFAF;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  z-index: 5;
}

/* Cardinal labels */
.dir {
  position: absolute;
  font-size: 20px;
  font-weight: 700;
  color: #7FFFBE;
  z-index: 5;
}

/* Aircraft dots */
.dot {
  position: absolute;
  width: 12px; height: 12px;
  background: #58FFAF;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  box-shadow: 0 0 18px #58FFAF;
  z-index: 6;
}

/* Callsign label */
.label {
  position: absolute;
  left: 14px; top: -8px;
  font-size: 14px;
  line-height: 1.3;
  white-space: nowrap;
  color: #D7FFE9;
  background: rgba(0,0,0,.5);
  padding: 1px 5px;
  border-radius: 5px;
  pointer-events: none;
}

/* ── RIGHT PANEL ── */
.panel {
  background: #091711;
  padding: 12px;
  overflow-y: auto;
  overflow-x: hidden;
}

.card {
  background: #10221A;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 10px;
}

.small { color: #8DB39C; font-size: 13px; }


/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   LANDSCAPE (≥601px wide)
   .left becomes a flex column: preset buttons on top, then the radar
   disc fills all remaining height. Panel gets 20% of screen width.
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
@media screen and (orientation: landscape) and (min-width: 601px) {

  .app {
    grid-template-columns: minmax(0, 4fr) minmax(0, 1fr);
  }

  /* Switch left column to flex so the disc can be sized with min() */
  .left {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 8px;
    gap: 6px;
  }

  h1 { display: none; }

  /* Only preset buttons visible in landscape; hide title/input/action btns */
  .controls .action,
  .controls input { display: none; }

  /* Disc: largest square that fits the left column (80vw × 100vh) */
  .radar {
    width:  min(calc(80vw - 16px), calc(100vh - 48px));
    height: min(calc(80vw - 16px), calc(100vh - 48px));
    max-width:  none;
    max-height: none;
    flex: 0 0 auto;
  }

  .panel { display: block; }
  .card  { padding: 8px; font-size: 13px; }
  .small { font-size: 12px; }
  #aircraftList { display: none; }
}


/* ── Aircraft dot — selected state ── */
.dot.selected {
  background: #ffffff;
  box-shadow: 0 0 22px #ffffff;
}
.dot.selected::after {
  content: '';
  position: absolute;
  inset: -6px;
  border: 1.5px solid rgba(255,255,255,0.55);
  border-radius: 50%;
  animation: pulse-ring 1.4s ease-out infinite;
}
@keyframes pulse-ring {
  0%   { transform: scale(1);   opacity: 0.7; }
  100% { transform: scale(2.6); opacity: 0;   }
}

/* ── Detail card (replaces panel content when aircraft selected) ── */
#detailCard {
  display: none;
  background: #0d1f17;
  border: 1px solid rgba(88,255,175,0.2);
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 10px;
  animation: fadeIn 0.18s ease;
}
#detailCard.visible { display: block; }
@keyframes fadeIn { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:none; } }

.detail-callsign {
  font-size: 20px;
  font-weight: 700;
  color: #58FFAF;
  letter-spacing: 0.07em;
  margin-bottom: 10px;
}
.detail-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding: 5px 0;
  border-bottom: 1px solid rgba(88,255,175,0.07);
  gap: 8px;
}
.detail-row:last-of-type { border-bottom: none; }
.detail-lbl {
  color: #4d7a60;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  flex-shrink: 0;
}
.detail-val {
  color: #D7FFE9;
  font-size: 12px;
  text-align: right;
}
.detail-close {
  width: 100%;
  margin-top: 10px;
  padding: 6px;
  font-size: 12px;
  background: transparent;
  border: 1px solid rgba(88,255,175,0.2);
  color: #4d7a60;
  border-radius: 8px;
  cursor: pointer;
}
.detail-close:hover { border-color: #58FFAF; color: #58FFAF; }

/* ── Last-known status banner ── */
.stale-banner {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  background: rgba(255,160,50,0.15);
  border-bottom: 1px solid rgba(255,160,50,0.5);
  color: #FFA032;
  font-size: 13px;
  text-align: center;
  padding: 6px 12px;
  letter-spacing: 0.04em;
  pointer-events: none;
}
.stale-banner.visible { display: block; }

</style>
</head>
<body>

<div class="stale-banner" id="staleBanner">
  ⚠ Last known positions — waiting for connection
</div>

<div class="app">

  <div class="left">
    <h1>LITTLE RADAR</h1>

    <div class="controls">
      <button class="action" onclick="locate()">Use my location</button>
      <button class="preset active" onclick="setRadius(25)">25 km</button>
      <button class="preset" onclick="setRadius(50)">50 km</button>
      <button class="preset" onclick="setRadius(100)">100 km</button>
      <input id="radius" value="25" type="number" min="1" max="500">
      <button class="action" onclick="scan()">Refresh</button>
    </div>

    <div class="radar" id="radar">
      <canvas id="mapCanvas"></canvas>

      <div class="sweep"></div>
      <div class="cross"></div>
      <div class="cross2"></div>

      <div class="ring" style="width:30%;height:30%;"><div class="ringLabel" id="ring1">—</div></div>
      <div class="ring" style="width:60%;height:60%;"><div class="ringLabel" id="ring2">—</div></div>
      <div class="ring" style="width:90%;height:90%;"><div class="ringLabel" id="ring3">—</div></div>

      <div class="dir" style="left:50%;top:6px;transform:translateX(-50%);">N</div>
      <div class="dir" style="right:6px;top:50%;">E</div>
      <div class="dir" style="left:50%;bottom:6px;transform:translateX(-50%);">S</div>
      <div class="dir" style="left:6px;top:50%;">W</div>

      <div class="center"></div>
    </div>
  </div>

  <div class="panel" id="panel">

    <!-- Aircraft detail — shown when a dot or list item is tapped -->
    <div id="detailCard">
      <div class="detail-callsign" id="detailCallsign">—</div>
      <div id="detailRows"></div>
      <button class="detail-close" onclick="clearSelection()">✕ Dismiss</button>
    </div>

    <!-- Default panel — hidden while detail is open -->
    <div id="panelDefault">
      <div class="card">Aircraft: <span id="count">0</span></div>
      <div class="card" id="location">Waiting…</div>
      <div class="card" id="aircraftList">No aircraft</div>
      <div class="card" id="logs">Logs</div>
    </div>

  </div>

</div>

<script>
// ── State ──
let userLat    = -34.92;
let userLon    =  138.60;
let selectedKey = null;

const MAP_FETCH_RADIUS = 100;

const radarEl        = document.getElementById("radar");
const mapCanvas      = document.getElementById("mapCanvas");
const radiusInput    = document.getElementById("radius");
const countEl        = document.getElementById("count");
const logsEl         = document.getElementById("logs");
const aircraftListEl = document.getElementById("aircraftList");
const locationEl     = document.getElementById("location");
const staleBanner    = document.getElementById("staleBanner");
const detailCard     = document.getElementById("detailCard");
const detailCallsign = document.getElementById("detailCallsign");
const detailRows     = document.getElementById("detailRows");
const panelDefault   = document.getElementById("panelDefault");

const planeMap = new Map(); // callsign → { el, lastSeen, x, y, data }
let cachedWays = [];


// ════════════════════════════════════════════════════════
// AIRCRAFT DETAIL PANEL
// ════════════════════════════════════════════════════════

function dRow(label, value) {
  if (value == null || value === "") return "";
  return `<div class="detail-row">
    <span class="detail-lbl">${label}</span>
    <span class="detail-val">${value}</span>
  </div>`;
}

function verticalStr(vr) {
  if (vr == null) return null;
  if (vr >  100) return `↑ climbing  ${vr.toLocaleString()} ft/min`;
  if (vr < -100) return `↓ descending  ${Math.abs(vr).toLocaleString()} ft/min`;
  return "→ level flight";
}

function showDetail(plane) {
  selectedKey = getKey(plane);
  planeMap.forEach((obj, k) => obj.el.classList.toggle("selected", k === selectedKey));

  detailCallsign.textContent = plane.flight || plane.icao || "Unknown";

  const altStr = plane.onGround
    ? "On ground"
    : (plane.altitudeM != null
        ? `${plane.altitudeM.toLocaleString()} m  /  ${plane.altitudeFt.toLocaleString()} ft`
        : null);

  const spdStr = plane.speedKmh != null
    ? `${plane.speedKmh} km/h  ·  ${plane.speedMph} mph  ·  ${plane.speedKnots} kts`
    : null;

  detailRows.innerHTML = [
    dRow("Distance",  `${plane.distance} km`),
    dRow("Altitude",  altStr),
    dRow("Speed",     spdStr),
    dRow("Heading",   plane.heading != null ? `${Math.round(plane.heading)}°` : null),
    dRow("Vertical",  verticalStr(plane.verticalRate)),
    dRow("ICAO",      plane.icao),
    dRow("Country",   plane.country),
    dRow("Squawk",    plane.squawk),
  ].join("");

  detailCard.classList.add("visible");
  panelDefault.style.display = "none";
}

function clearSelection() {
  selectedKey = null;
  planeMap.forEach(obj => obj.el.classList.remove("selected"));
  detailCard.classList.remove("visible");
  panelDefault.style.display = "";
}

// Click on the radar background dismisses the detail
radarEl.addEventListener("click", e => {
  if (!e.target.classList.contains("dot")) clearSelection();
});


// ════════════════════════════════════════════════════════
// MAP LAYER
// ════════════════════════════════════════════════════════

function geoToCanvas(lat, lon, cLat, cLon, radiusKm, size) {
  const kmPerDegLat = 111.32;
  const kmPerDegLon = 111.32 * Math.cos(cLat * Math.PI / 180);
  const dy =  (lat - cLat) * kmPerDegLat;
  const dx =  (lon - cLon) * kmPerDegLon;
  const scale = (size * 0.45) / radiusKm;
  return [size / 2 + dx * scale, size / 2 - dy * scale];
}

function drawMap(ways, cLat, cLon, displayRadiusKm) {
  const size = mapCanvas.width;
  const ctx  = mapCanvas.getContext("2d");
  ctx.clearRect(0, 0, size, size);
  ctx.save();
  ctx.beginPath();
  ctx.arc(size / 2, size / 2, size / 2 - 1, 0, Math.PI * 2);
  ctx.clip();

  ways.forEach(way => {
    if (!way.geometry || way.geometry.length < 2) return;
    const tags        = way.tags || {};
    const isWater     = tags.natural === "coastline" || tags.waterway ||
                        tags.natural === "water"     || tags.natural === "bay";
    const isMajorRoad = ["motorway","trunk","primary","secondary"].includes(tags.highway);
    const isMinorRoad = ["tertiary","unclassified","residential"].includes(tags.highway);
    const isBoundary  = tags.boundary === "administrative";

    if      (isWater)     { ctx.strokeStyle = "rgba(88,210,255,0.35)"; ctx.lineWidth = 1.2; ctx.setLineDash([]); }
    else if (isMajorRoad) { ctx.strokeStyle = "rgba(88,255,175,0.22)"; ctx.lineWidth = 1.0; ctx.setLineDash([]); }
    else if (isMinorRoad) { ctx.strokeStyle = "rgba(88,255,175,0.11)"; ctx.lineWidth = 0.6; ctx.setLineDash([]); }
    else if (isBoundary)  { ctx.strokeStyle = "rgba(88,255,175,0.14)"; ctx.lineWidth = 0.8; ctx.setLineDash([4,6]); }
    else                  { ctx.strokeStyle = "rgba(88,255,175,0.08)"; ctx.lineWidth = 0.5; ctx.setLineDash([]); }

    ctx.beginPath();
    way.geometry.forEach((pt, i) => {
      const [x, y] = geoToCanvas(pt.lat, pt.lon, cLat, cLon, displayRadiusKm, size);
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.stroke();
  });

  ctx.setLineDash([]);
  ctx.restore();
}

function buildOverpassQuery(lat, lon) {
  const r      = MAP_FETCH_RADIUS;
  const deg    = (r / 111.32) * 1.1;
  const cosLat = Math.cos(lat * Math.PI / 180);
  const s = lat - deg,          n = lat + deg;
  const w = lon - deg / cosLat, e = lon + deg / cosLat;
  const bbox = `${s.toFixed(5)},${w.toFixed(5)},${n.toFixed(5)},${e.toFixed(5)}`;
  return `[out:json][timeout:30];
(
  way["natural"="coastline"](${bbox});
  way["waterway"~"river|stream|canal"](${bbox});
  way["natural"~"water|bay"](${bbox});
  way["highway"~"motorway|trunk|primary|secondary|tertiary|unclassified|residential"](${bbox});
  way["boundary"="administrative"]["admin_level"~"^(6|7|8)$"](${bbox});
);
out geom;`;
}

async function fetchMap(lat, lon) {
  mapCanvas.style.opacity = "0";
  try {
    log("Fetching map (100 km)…");
    const res  = await fetch("https://overpass-api.de/api/interpreter", {
      method: "POST", body: buildOverpassQuery(lat, lon),
      headers: { "Content-Type": "text/plain" }
    });
    const data = await res.json();
    cachedWays = data.elements;
    redrawMap();
    log("Map ready");
  } catch (e) { log("Map error: " + e.message); }
}

function redrawMap() {
  if (!cachedWays.length) return;
  const displayRadius = Number(radiusInput.value || 25);
  const size = radarEl.offsetWidth;
  if (size === 0) return;
  mapCanvas.width  = size;
  mapCanvas.height = size;
  drawMap(cachedWays, userLat, userLon, displayRadius);
  mapCanvas.style.opacity = "1";
}


// ════════════════════════════════════════════════════════
// AIRCRAFT DOTS
// ════════════════════════════════════════════════════════

function log(msg) {
  logsEl.insertAdjacentHTML(
    "afterbegin",
    `<div class="small">${new Date().toLocaleTimeString()} · ${msg}</div>`
  );
}

function getKey(p) { return (p.flight || p.icao || "unknown").trim(); }

function createDot(key) {
  const el = document.createElement("div");
  el.className = "dot";
  el.style.transition = "left 2s linear, top 2s linear, opacity 1s";
  el.style.opacity = "0";
  el.innerHTML = `<div class="label"></div>`;
  el.addEventListener("click", e => {
    e.stopPropagation();
    const obj = planeMap.get(key);
    if (obj) showDetail(obj.data);
  });
  radarEl.appendChild(el);
  return el;
}

function bearingTo(lat1, lon1, lat2, lon2) {
  const toRad = d => d * Math.PI / 180;
  const dLon  = toRad(lon2 - lon1);
  const y = Math.sin(dLon) * Math.cos(toRad(lat2));
  const x = Math.cos(toRad(lat1)) * Math.sin(toRad(lat2))
          - Math.sin(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.cos(dLon);
  return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
}

function updatePlane(plane, radius) {
  const key = getKey(plane);
  let obj = planeMap.get(key);
  if (!obj) {
    obj = { el: createDot(key), lastSeen: Date.now(), x: 50, y: 50, data: plane };
    planeMap.set(key, obj);
  }
  obj.data = plane; // keep fresh for detail panel
  if (selectedKey === key) showDetail(plane); // refresh open detail

  let angleRad;
  if (plane.lat != null && plane.lon != null) {
    const bearing = bearingTo(userLat, userLon, plane.lat, plane.lon);
    angleRad = (bearing - 90) * Math.PI / 180;
  } else {
    angleRad = ((plane.bearing || plane.heading || 0) - 90) * Math.PI / 180;
  }

  const r = Math.min(plane.distance / radius, 1) * 45;
  obj.x = 50 + Math.cos(angleRad) * r;
  obj.y = 50 + Math.sin(angleRad) * r;
  obj.el.style.left    = obj.x + "%";
  obj.el.style.top     = obj.y + "%";
  obj.el.style.opacity = "1";
  obj.el.classList.toggle("selected", key === selectedKey);
  obj.el.querySelector(".label").innerHTML = `${key}<br>${plane.distance} km`;
  obj.lastSeen = Date.now();
}

function resolveLabels() {
  const entries = [...planeMap.values()].filter(o => o.el.style.opacity !== "0");
  if (entries.length < 2) return;
  const { width: W, height: H } = radarEl.getBoundingClientRect();
  const labels = entries.map(obj => {
    const labelEl = obj.el.querySelector(".label");
    return { labelEl,
      lx: (obj.x / 100) * W, ly: (obj.y / 100) * H,
      ox: 14, oy: -8,
      lw: labelEl.offsetWidth  || 70,
      lh: labelEl.offsetHeight || 32 };
  });
  const PAD = 6;
  for (let pass = 0; pass < 3; pass++) {
    for (let i = 0; i < labels.length; i++) {
      for (let j = i + 1; j < labels.length; j++) {
        const a = labels[i], b = labels[j];
        const ax1=a.lx+a.ox, ay1=a.ly+a.oy, ax2=ax1+a.lw, ay2=ay1+a.lh;
        const bx1=b.lx+b.ox, by1=b.ly+b.oy, bx2=bx1+b.lw, by2=by1+b.lh;
        if (ax1<bx2+PAD && ax2+PAD>bx1 && ay1<by2+PAD && ay2+PAD>by1) {
          const shift = (ay2+PAD-by1)/2;
          a.oy -= shift; b.oy += shift;
        }
      }
    }
  }
  labels.forEach(({ labelEl, ox, oy }) => {
    labelEl.style.left = ox + "px";
    labelEl.style.top  = oy + "px";
  });
}

function cleanup() {
  const now = Date.now();
  planeMap.forEach((obj, key) => {
    if (now - obj.lastSeen > 30000) {
      obj.el.style.opacity = "0";
      setTimeout(() => obj.el.remove(), 1000);
      planeMap.delete(key);
      if (selectedKey === key) clearSelection();
    }
  });
}

function updateRingLabels() {
  const r = Number(radiusInput.value || 25);
  document.getElementById("ring1").textContent = `${Math.round(r * .33)} km`;
  document.getElementById("ring2").textContent = `${Math.round(r * .66)} km`;
  document.getElementById("ring3").textContent = `${r} km`;
}

function setRadius(km) {
  radiusInput.value = km;
  document.querySelectorAll(".preset").forEach(btn => {
    btn.classList.toggle("active", parseInt(btn.textContent) === km);
  });
  updateRingLabels();
  redrawMap();
  scan();
}

radiusInput.addEventListener("input", () => {
  document.querySelectorAll(".preset").forEach(b => b.classList.remove("active"));
});

// ── Main scan ──

async function scan() {
  const radius = Number(radiusInput.value || 25);
  updateRingLabels();
  log(`Scanning ${radius} km`);

  let planes  = [];
  let isStale = false;

  try {
    const res  = await fetch(`/planes?lat=${userLat}&lon=${userLon}&radius=${radius}`);
    const data = await res.json();
    planes  = data.planes || [];
    isStale = data.stale  || false;
  } catch (e) {
    isStale = true;
    log("Connection lost — showing last known positions");
  }

  staleBanner.classList.toggle("visible", isStale);
  if (isStale) log("Showing last known positions");

  countEl.textContent      = planes.length;
  aircraftListEl.innerHTML = "";

  planes.forEach(p => {
    updatePlane(p, radius);
    const glyph = p.onGround ? "⬤" : "✈";
    const key   = getKey(p);
    aircraftListEl.insertAdjacentHTML(
      "beforeend",
      `<div class="small" style="cursor:pointer;padding:2px 0"
            onclick="showDetailByKey('${key.replace(/'/g,"\\'")}')">
         ${glyph} ${key} · ${p.distance} km
       </div>`
    );
  });

  cleanup();
  requestAnimationFrame(() => requestAnimationFrame(resolveLabels));
  locationEl.innerHTML =
    `${userLat.toFixed(4)}<br>${userLon.toFixed(4)}<br>Radius: ${radius} km`;
}

function showDetailByKey(key) {
  const obj = planeMap.get(key);
  if (obj) showDetail(obj.data);
}

// ── Geolocation ──

let geoWatchId = null;

function locate() {
  if (geoWatchId !== null) navigator.geolocation.clearWatch(geoWatchId);
  geoWatchId = navigator.geolocation.watchPosition(
    pos => {
      const newLat = pos.coords.latitude;
      const newLon = pos.coords.longitude;
      const moved  = Math.abs(newLat - userLat) > 0.002 ||
                     Math.abs(newLon - userLon) > 0.002;
      userLat = newLat;
      userLon = newLon;
      if (moved || cachedWays.length === 0) {
        log("Location updated — refreshing map");
        fetchMap(userLat, userLon);
      }
    },
    err => {
      log("Location error: " + err.message + " — using last known position");
      if (cachedWays.length === 0) fetchMap(userLat, userLon);
    },
    { enableHighAccuracy: false, timeout: 10000, maximumAge: 60000 }
  );
}

// ── Boot ──
locate();
scan();
setInterval(scan, 15000);
</script>
